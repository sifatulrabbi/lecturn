[project]
name = "lecturn-tts-contract"
version = "0.1.0"
description = "Shared, zero-dependency contract for lecturn's local Kokoro TTS surface: the voice catalogue, model id, defaults, and limits that BOTH the lecturn CLI and the lecturn-kokoro-server must agree on."
readme = "README.md"
# Deliberately broad so it satisfies BOTH consumers: the CLI (>=3.12, no upper
# bound) and the server (>=3.12,<3.13, pinned by kokoro). Keep it dependency-free
# — it must import in either environment without pulling anything heavy.
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "lecturn contributors" }]
keywords = ["tts", "kokoro", "openai-compatible", "contract"]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lecturn_tts_contract"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
