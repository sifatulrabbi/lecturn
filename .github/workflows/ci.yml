name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract (lecturn-tts-contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lecturn-tts-contract
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        # Zero third-party deps; this is near-instant.
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Test
        run: uv run pytest

  cli:
    name: CLI (textbook-audiobook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install ffmpeg
        # pydub / the audio-path tests need a real ffmpeg on PATH.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Sync (runtime + dev)
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Test (offline, no API key)
        run: uv run pytest

  server:
    name: Server (lecturn-kokoro-server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Sync (runtime + dev)
        # Installs the heavy torch/kokoro stack; the suite itself stays offline
        # (the fake pipeline_factory in tests keeps torch out of the import path).
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Test (offline, no weights downloaded)
        run: uv run pytest
